<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <script type="text/javascript">window._trackJs = { token: '6f4fa9309f2a431f95be282a03db8f81' };</script>
  <script type="text/javascript" src="https://cdn.trackjs.com/releases/current/tracker.js"></script>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    // Custom Error Class
    class CalculatorError extends Error {
      constructor(message) {
        super(message);
        this.name = "CalculatorError";
      }
    }

    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;

      try {
        // 1. Throw a Custom Error if fields are empty
        if (firstNum === '' || secondNum === '') {
          throw new CalculatorError("Both input fields must be filled out!");
        }

        // 2. The eval() function can naturally throw a SyntaxError if inputs are invalid (like letters)
        let result = eval(`${firstNum} ${operator} ${secondNum}`);

        // 3. Throw a standard Error for dividing by zero
        if (operator === '/' && secondNum === '0') {
          throw new Error("Cannot divide by zero!");
        }

        output.innerHTML = result;

      } catch (err) {
        // Catch the error and log it to the console, and show it on the UI
        console.error(`${err.name} caught:`, err.message);
        output.innerHTML = err.message;
        
      } finally {
        // Finally blocks run regardless of success or failure
        console.log("Calculation attempt finished.");
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    const demoData = [
      { course: "Software Engineering", number: 110 },
      { course: "Data Structures", number: 100 }
    ];

    // Console Log
    errorBtns[0].addEventListener('click', () => {
      console.log("Console Log Demo button clicked!");
    });

    // Console Error
    errorBtns[1].addEventListener('click', () => {
      console.error("This is a simulated error message!");
    });

    //Console Count
    errorBtns[2].addEventListener('click', () => {
      console.count("Count Button clicked");
    });

    //  Console Warn
    errorBtns[3].addEventListener('click', () => {
      console.warn("This is a warning!");
    });

    //  Console Assert
    errorBtns[4].addEventListener('click', () => {
      const number = 2;
      console.assert(number === 3, "Assertion failed: number is not equal to 3");
    });

    //Console Clear
    errorBtns[5].addEventListener('click', () => {
      console.clear();
    });

    // Console Dir
    errorBtns[6].addEventListener('click', () => {
      console.dir(document.body);
    });

    // Console dirxml
    errorBtns[7].addEventListener('click', () => {
      console.dirxml(document);
    });

    //  Console Group Start
    errorBtns[8].addEventListener('click', () => {
      console.group("My Console Group");
      console.log("We are inside the group now!");
    });

    //  Console Group End
    errorBtns[9].addEventListener('click', () => {
      console.groupEnd();
    });

    // Console Table
    errorBtns[10].addEventListener('click', () => {
      console.table(demoData);
    });

    // Start Timer
    errorBtns[11].addEventListener('click', () => {
      console.time("DemoTimer");
      console.log("Timer started...");
    });

    // End Timer
    errorBtns[12].addEventListener('click', () => {
      console.timeEnd("DemoTimer");
    });

    // Console Trace
    errorBtns[13].addEventListener('click', () => {
      const deepFunction = () => { console.trace("Trace demo!"); };
      deepFunction();
    });

    // Catch unhandled errors globally
    window.addEventListener('error', (event) => {
      console.log('Global error caught: ', event.message);
    });

    // Trigger a Global Error
    errorBtns[14].addEventListener('click', () => {
      console.log("Attempting to trigger a global error...");
      // This function doesn't exist, so it will throw an uncaught ReferenceError
      sadlyThisFunctionDoesNotExist(); 
    });
    
  </script>
</body>

</html>
