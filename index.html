<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;
      output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    const demoData = [
      { course: "Software Engineering", number: 110 },
      { course: "Data Structures", number: 100 }
    ];

    // 0. Console Log
    errorBtns[0].addEventListener('click', () => {
      console.log("Console Log Demo button clicked!");
    });

    // 1. Console Error
    errorBtns[1].addEventListener('click', () => {
      console.error("This is a simulated error message!");
    });

    // 2. Console Count
    errorBtns[2].addEventListener('click', () => {
      console.count("Count Button clicked");
    });

    // 3. Console Warn
    errorBtns[3].addEventListener('click', () => {
      console.warn("This is a warning!");
    });

    // 4. Console Assert
    errorBtns[4].addEventListener('click', () => {
      const number = 2;
      console.assert(number === 3, "Assertion failed: number is not equal to 3");
    });

    // 5. Console Clear
    errorBtns[5].addEventListener('click', () => {
      console.clear();
    });

    // 6. Console Dir
    errorBtns[6].addEventListener('click', () => {
      console.dir(document.body);
    });

    // 7. Console dirxml
    errorBtns[7].addEventListener('click', () => {
      console.dirxml(document);
    });

    // 8. Console Group Start
    errorBtns[8].addEventListener('click', () => {
      console.group("My Console Group");
      console.log("We are inside the group now!");
    });

    // 9. Console Group End
    errorBtns[9].addEventListener('click', () => {
      console.groupEnd();
    });

    // 10. Console Table
    errorBtns[10].addEventListener('click', () => {
      console.table(demoData);
    });

    // 11. Start Timer
    errorBtns[11].addEventListener('click', () => {
      console.time("DemoTimer");
      console.log("Timer started...");
    });

    // 12. End Timer
    errorBtns[12].addEventListener('click', () => {
      console.timeEnd("DemoTimer");
    });

    // 13. Console Trace
    errorBtns[13].addEventListener('click', () => {
      const deepFunction = () => { console.trace("Trace demo!"); };
      deepFunction();
    });

    // 14. Trigger a Global Error (Skipped for now per Step 2 instructions)
    
  </script>
</body>

</html>
